name: Update World Leaders

on:
  schedule:
    - cron: '0 6 * * 1'   # כל יום שני בשעה 06:00 UTC
  workflow_dispatch:        # אפשרות להרצה ידנית

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Only one run at a time; additional triggers queue and wait.
concurrency:
  group: update-world-leaders
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # נדרש כדי לדחוף ל-main

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run scraper
        run: python world_leaders_scraper.py
        env:
          CI: "true"        # מפעיל headless mode בסקרייפר

      - name: Commit and push JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add top_world_leaders.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update world leaders data [$(date -u +%Y-%m-%d)]"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Attempt $attempt failed, retrying in $((2 ** attempt))s..."
            sleep $((2 ** attempt))
          done
          exit 1
